name: Backend CI

on:
  push:
    paths:
      - 'backend/**'

  pull_request:
    paths:
      - 'backend/**'

jobs:
  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Validate Backend
        run: npm install